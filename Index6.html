<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="images/my-logo2.png" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7HTZ6VWYMZ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag("js", new Date());
    gtag("config", "G-7HTZ6VWYMZ");
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rent To Own Auto Centers</title>

  <link
    href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    :root {
      --primary: #0b5ed7;
      --primaryDark: #084bb0;
      --dark: #0f172a;
      --blue-1: #e7f1ff;
    }

    body { color: #0b1220; background: #ffffff; }

    .section { padding: 70px 0; }
    .section-title { font-weight: 900; }

    .section-blue-1 { background: var(--blue-1); }

    .soft-card {
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.06);
    }

    .vehicle-img {
      height: 160px;
      background: linear-gradient(135deg, rgba(11,94,215,0.25), rgba(7,59,143,0.18));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
    }

    /* Featured Banner */
    .featured-sale-banner {
      text-align: center;
      margin: 0 0 40px 0;
    }

    .featured-sale-banner img {
      max-width: 520px;
      width: 100%;
      height: auto;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .featured-sale-banner img:hover {
      transform: scale(1.05);
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    }

    footer {
      background: #0b1220;
      color: #fff;
    }
  </style>
</head>

<body>

  <!-- FEATURED VEHICLES SECTION -->
  <section class="section section-blue-1">
    <div class="container">

      <!-- 🔥 Banner First -->
      <div class="featured-sale-banner">
        <a href="https://www.rtocenter.com/orlando.html">
          <img 
            src="images/OnSaleStarting389blue.png" 
            alt="On Sale Rent To Own Vehicles Starting from $389 Down"
          >
        </a>
      </div>

      <!-- Now the Featured Vehicles Text -->
      <div class="row align-items-end mb-4">
        <div class="col-lg-7">
          <h2 class="section-title mb-2">Featured Vehicles</h2>
          <p class="text-muted mb-0">
            A quick look at what’s popular right now.
          </p>
        </div>
      </div>

      <!-- Vehicle Cards -->
      <div class="row">
        <div class="col-md-4 mb-4">
          <div class="card soft-card h-100">
            <div class="vehicle-img">Vehicle Photo</div>
            <div class="card-body">
              <h5 class="font-weight-bold mb-1">Sedan</h5>
              <p class="text-muted mb-3">Great MPG • Comfortable • Reliable</p>
            </div>
          </div>
        </div>

        <div class="col-md-4 mb-4">
          <div class="card soft-card h-100">
            <div class="vehicle-img">Vehicle Photo</div>
            <div class="card-body">
              <h5 class="font-weight-bold mb-1">SUV</h5>
              <p class="text-muted mb-3">Family-ready • Space • Versatile</p>
            </div>
          </div>
        </div>

        <div class="col-md-4 mb-4">
          <div class="card soft-card h-100">
            <div class="vehicle-img">Vehicle Photo</div>
            <div class="card-body">
              <h5 class="font-weight-bold mb-1">Truck</h5>
              <p class="text-muted mb-3">Capability • Utility • Tough</p>
            </div>
          </div>
        </div>
      </div>

    </div>
  </section>

  <footer class="py-5">
    <div class="container text-center">
      <p class="mb-0">&copy; 2024 Rent To Own Auto Centers. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
